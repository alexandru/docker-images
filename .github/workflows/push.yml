on:
  workflow_dispatch:
  schedule:
    # Runs every week
    - cron: '0 0 * * 0'

jobs:
  push-tools:
    name: jdk-build-tools (${{ matrix.platform }})
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          make push-jdk-build-tools-platform PLATFORM=${{ matrix.platform }}

  push-tools-manifest:
    name: jdk-build-tools manifest
    needs: push-tools
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      contents: read

    steps:
